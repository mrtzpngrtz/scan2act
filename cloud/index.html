<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Submit Your Prompt</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr;
            min-height: 100vh;
        }
        .container {
            padding: 20px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-left: 1px solid #000;
            border-right: 1px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .header-box {
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        p {
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 150px;
            background-color: #ffffff;
            border: 2px solid #000000;
            color: #000000;
            padding: 15px;
            font-size: 18px;
            font-family: inherit;
            margin-bottom: 20px;
            resize: none;
            box-sizing: border-box;
            border-radius: 0;
        }
        textarea:focus {
            outline: none;
            background-color: #f0f0f0;
        }
        button {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 15px 30px;
            font-size: 18px;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            border-radius: 0;
        }
        button:hover {
            background-color: #ffffff;
            color: #000000;
        }
        button:disabled {
            background-color: #cccccc;
            border-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            min-height: 24px;
            padding: 10px;
            border: 2px solid transparent;
        }
        .error {
            border-color: #000;
            background-color: #000;
            color: #fff;
        }
        .success {
            border-color: #000;
            background-color: #fff;
            color: #000;
        }
        #loading {
            display: none;
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="header-box">
        <h1>SCAN2ACT</h1>
        <p>ENTER PROMPT BELOW</p>
    </div>
    
    <div id="form-section" style="display: none;">
        <textarea id="promptInput" placeholder="A futuristic city at sunset..."></textarea>
        <button id="submitBtn">Generate Image</button>
    </div>
    
    <div id="message" class="message">Verifying code...</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    const messageEl = document.getElementById('message');
    const formSection = document.getElementById('form-section');
    const submitBtn = document.getElementById('submitBtn');
    const promptInput = document.getElementById('promptInput');
    
    // Config: URL to backend
    const BACKEND_URL = 'backend.php';

    async function checkToken() {
        if (!token) {
            showMessage('No valid code found. Please scan the QR code on the screen.', 'error');
            return;
        }
        
        try {
            const response = await fetch(`${BACKEND_URL}?action=check_token&token=${token}`);
            const data = await response.json();
            
            if (data.valid) {
                formSection.style.display = 'block';
                showMessage('', '');
                promptInput.focus();
            } else {
                showMessage('This code has expired or is invalid. Please scan the screen again.', 'error');
            }
        } catch (err) {
            showMessage('Error connecting to server. Try again later.', 'error');
        }
    }

    function showMessage(msg, type) {
        messageEl.textContent = msg;
        messageEl.className = 'message ' + type;
    }

    submitBtn.addEventListener('click', async () => {
        const prompt = promptInput.value.trim();
        if (!prompt) {
            showMessage('Please enter a prompt first.', 'error');
            return;
        }
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';
        showMessage('', '');
        
        try {
            const response = await fetch(`${BACKEND_URL}?action=submit_prompt`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, prompt })
            });
            const data = await response.json();
            
            if (data.success) {
                formSection.style.display = 'none';
                showMessage('Success! Look at the screen.', 'success');
            } else {
                showMessage(data.error || 'Failed to submit prompt.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Generate Image';
            }
        } catch (err) {
            showMessage('Error sending prompt. Try again.', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Generate Image';
        }
    });

    // Run check on load
    checkToken();
</script>

</body>
</html>
