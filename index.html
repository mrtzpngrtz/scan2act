<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Submit Your Prompt</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #16213e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #e94560;
        }
        textarea {
            width: 100%;
            height: 120px;
            background-color: #0f3460;
            border: 1px solid #e94560;
            color: #fff;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 20px;
            resize: none;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            box-shadow: 0 0 8px #e94560;
        }
        button {
            background-color: #e94560;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #d1304d;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            font-size: 16px;
            min-height: 24px;
        }
        .error {
            color: #ff6b6b;
        }
        .success {
            color: #51cf66;
        }
        #loading {
            display: none;
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <h1>Create Your Image</h1>
    <p>Enter your prompt below to change the image on the screen.</p>
    
    <div id="form-section" style="display: none;">
        <textarea id="promptInput" placeholder="A futuristic city at sunset..."></textarea>
        <button id="submitBtn">Generate Image</button>
    </div>
    
    <div id="message" class="message">Verifying code...</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    const messageEl = document.getElementById('message');
    const formSection = document.getElementById('form-section');
    const submitBtn = document.getElementById('submitBtn');
    const promptInput = document.getElementById('promptInput');
    
    // Config: URL to backend
    const BACKEND_URL = 'backend.php';

    async function checkToken() {
        if (!token) {
            showMessage('No valid code found. Please scan the QR code on the screen.', 'error');
            return;
        }
        
        try {
            const response = await fetch(`${BACKEND_URL}?action=check_token&token=${token}`);
            const data = await response.json();
            
            if (data.valid) {
                formSection.style.display = 'block';
                showMessage('', '');
                promptInput.focus();
            } else {
                showMessage('This code has expired or is invalid. Please scan the screen again.', 'error');
            }
        } catch (err) {
            showMessage('Error connecting to server. Try again later.', 'error');
        }
    }

    function showMessage(msg, type) {
        messageEl.textContent = msg;
        messageEl.className = 'message ' + type;
    }

    submitBtn.addEventListener('click', async () => {
        const prompt = promptInput.value.trim();
        if (!prompt) {
            showMessage('Please enter a prompt first.', 'error');
            return;
        }
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';
        showMessage('', '');
        
        try {
            const response = await fetch(`${BACKEND_URL}?action=submit_prompt`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, prompt })
            });
            const data = await response.json();
            
            if (data.success) {
                formSection.style.display = 'none';
                showMessage('Success! Look at the screen.', 'success');
            } else {
                showMessage(data.error || 'Failed to submit prompt.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Generate Image';
            }
        } catch (err) {
            showMessage('Error sending prompt. Try again.', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Generate Image';
        }
    });

    // Run check on load
    checkToken();
</script>

</body>
</html>
