<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scan2act Local Output</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 50px;
            color: #666;
        }
        #output-container {
            border: 2px solid #fff;
            padding: 40px;
            min-width: 300px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .type-badge {
            background: #fff;
            color: #000;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .data-content {
            font-size: 32px;
            font-weight: bold;
        }
        .data-content img {
            max-width: 100%;
            border: 1px solid #333;
        }
        .sliders-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            font-size: 20px;
            text-align: left;
        }
        .vote-number {
            font-size: 100px;
            margin: 0;
            line-height: 1;
        }
    </style>
</head>
<body>

    <h1>scan2act Local Output</h1>

    <div id="output-container">
        <div class="type-badge" id="data-type">Waiting...</div>
        <div class="data-content" id="data-value">No data received yet.</div>
    </div>

    <script>
        let lastRawData = "";

        async function fetchLatestData() {
            try {
                const response = await fetch('http://127.0.0.1:8080/api/latest');
                const text = await response.text();
                
                if (text !== lastRawData) {
                    lastRawData = text;
                    const data = JSON.parse(text);
                    renderData(data);
                }
            } catch (err) {
                console.error("Error fetching data. Is app.py running?", err);
            }
        }

        function renderData(payload) {
            const typeBadge = document.getElementById('data-type');
            const dataValue = document.getElementById('data-value');

            typeBadge.innerText = `Type: ${payload.type}`;

            if (payload.type === 'text') {
                dataValue.innerHTML = `"${payload.data}"`;
            } else if (payload.type === 'choice') {
                dataValue.innerHTML = payload.data;
            } else if (payload.type === 'drawing') {
                dataValue.innerHTML = `<img src="${payload.data}" alt="User Drawing">`;
            } else if (payload.type === 'sliders') {
                const s = payload.data;
                dataValue.innerHTML = `
                    <div class="sliders-grid">
                        <div>Param 1: <b>${s.param1}</b></div>
                        <div>Param 2: <b>${s.param2}</b></div>
                        <div>Param 3: <b>${s.param3}</b></div>
                        <div>Param 4: <b>${s.param4}</b></div>
                        <div>Param 5: <b>${s.param5}</b></div>
                    </div>
                `;
            } else if (payload.type === 'vote') {
                dataValue.innerHTML = `<div class="vote-number">${payload.data}</div>`;
            } else {
                dataValue.innerText = payload.data;
            }
        }

        // Poll the local server every 500ms
        setInterval(fetchLatestData, 500);
        
        // Initial fetch
        fetchLatestData();
    </script>
</body>
</html>
